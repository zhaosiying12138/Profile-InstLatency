# Phase 0 bootstrap paths for RVV instruction latency profiling.
# Values may be absolute paths or repo-relative paths. Use null when a path is
# not installed or intentionally deferred.

# Valid modes:
#   synthetic_calibration - use configured synthetic/cmodel ground truth.
#   real_platform_profile - profile a real platform without golden latencies.
mode: synthetic_calibration

# Read-only LLVM checkout used to inspect RISC-V schedule-model fields.
llvm_checkout: /home/zhaosiying/codebase/compiler/llvm-project-21

# gem5 source checkout for the MinorCPU RVV baseline and later timing patches.
gem5_checkout: /home/zhaosiying/codebase/compiler/gem5

# Built gem5 executable, for example build/RISCV/gem5.opt inside gem5_checkout.
gem5_build: /home/zhaosiying/codebase/compiler/gem5/build/RISCV/gem5.opt

# RISC-V assembler and linker.
assembler: /home/zhaosiying/codebase/software/LLVM-19.1.3-Linux-X64/bin/llvm-mc
linker: /home/zhaosiying/codebase/software/LLVM-19.1.3-Linux-X64/bin/ld.lld

# Repository-local result root used by later phases.
output_root: results
