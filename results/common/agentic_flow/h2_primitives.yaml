flow_nodes:
  - id: env-check
    primitive: h2-check
    uses: check_env
  - id: worker-parallel-round-0
    primitive: h2-parallel
    workers: [A, B, C, D, E, F, G, H]
  - id: analyze-and-search
    primitive: h2-transform
    uses: [analyze, search_model]
  - id: synthetic-calibration-gate
    primitive: h2-check
    uses: check_calibration_gate
    mode: synthetic_calibration
  - id: real-platform-search-rounds-2-4
    primitive: h2-transform
    uses: [search_model, analyze]
    mode: real_platform_profile
  - id: real-platform-confidence-gate
    primitive: h2-human
    mode: real_platform_profile
    current_status: fail_closed_awaiting_approval
  - id: round5-code-worker-candidate-simulator
    primitive: h2-agent
    worker: Anscombe
    commit: 773f27d67e8306ec8fbafc434dcd158953e71e95
    uses: [search_model, analyze]
    prompt: artifacts/prompts/round-5-code-worker-candidate-simulator.md
    artifacts:
      contract: artifacts/worker_contracts/worker-r5-code.md
      output: artifacts/worker_outputs/worker-r5-code.md
      verification: artifacts/verification/worker-r5-code.md
      tool_call: artifacts/tool_calls/worker-r5-code-normalized.json
    status: reviewed_accepted_for_candidate_simulator_scope
  - id: round5-capture-refresh
    primitive: h2-agent
    worker: Kepler
    owned_write_set: results/common/agentic_flow/**
    status: superseded_by_round6_code_worker_capture_package
  - id: round6-approval-gate-worker-gibbs
    primitive: h2-agent
    worker: Gibbs
    commit: ea7c0acaa5d144ffd8aa5bb0ac3f8f17b8b156ac
    uses: [analyze, check_calibration_gate]
    prompt: artifacts/prompts/round-6-approval-gate-worker-gibbs.md
    owned_write_set:
      - scripts/analyze.py
      - scripts/check_calibration_gate.py
      - tests/test_check_calibration_gate_approval.py
      - results/common/real_platform_inventory.json
      - results/common/experiment_quality.md
    artifacts:
      contract: artifacts/worker_contracts/worker-r6-gibbs-approval-gate.md
      output: artifacts/worker_outputs/worker-r6-gibbs-approval-gate.md
      verification: artifacts/verification/worker-r6-gibbs-approval-gate.md
      tool_call: artifacts/tool_calls/worker-r6-gibbs-approval-gate-normalized.json
    approval_boundary:
      fail_closed_without_approval: true
      approval_artifact_created: false
      unresolved_non_identifiable_risks: 39
      must_bind_to_hashes:
        real_platform_inventory_json: 4f25f066db09e0212200d48a181fd582e685701c16d18ca045dbc4738e4fb54b
        real_platform_field_status_json: 904cca46aff4a923bc230d069230e15eb164af043f020dab33e5546f18560179
    status: reviewed_accepted_for_approval_gate_behavior_capture_added
  - id: round7-risk-acceptance-request-worker
    primitive: h2-agent
    worker: Round7RiskRequest
    prompt: artifacts/prompts/round-7-risk-acceptance-request-worker.md
    owned_write_set:
      - results/common/real_platform_risk_acceptance_request.json
      - results/common/agentic_flow/**
    artifacts:
      request: ../real_platform_risk_acceptance_request.json
      contract: artifacts/worker_contracts/worker-r7-risk-request.md
      output: artifacts/worker_outputs/worker-r7-risk-request.md
      verification: artifacts/verification/worker-r7-risk-request.md
      tool_call: artifacts/tool_calls/worker-r7-risk-request.json
    request_boundary:
      status: pending_not_approved
      gate_consumed: false
      approval_artifact_created: false
      unresolved_non_identifiable_risks: 39
      gate_command: python3 scripts/check_calibration_gate.py --mode real_platform_profile --profile-root results
      expected_fail_closed_reasons:
        - missing Gate status PASS
        - missing machine-readable human approval
        - 39 unresolved non_identifiable risks
      must_bind_to_hashes:
        real_platform_inventory_json: 4f25f066db09e0212200d48a181fd582e685701c16d18ca045dbc4738e4fb54b
        real_platform_field_status_json: 904cca46aff4a923bc230d069230e15eb164af043f020dab33e5546f18560179
      next_human_step: present_request_before_creating_human_approval_json
    status: pending_human_decision_request_created
  - id: llvm-worktree-helper
    primitive: h2-check
    uses: prepare_llvm_yushuxin_worktree
approval_boundary:
  primitive: h2-human
  required: true
  artifact_exists: false
  approval_search_command: find results/common -maxdepth 1 -iname '*approval*' -print
  risk_acceptance_request:
    path: ../real_platform_risk_acceptance_request.json
    status: pending_not_approved
    gate_consumed: false
    present_to_human_before_human_approval_json: true
  must_bind_to_hashes:
    real_platform_inventory_json: 4f25f066db09e0212200d48a181fd582e685701c16d18ca045dbc4738e4fb54b
    real_platform_field_status_json: 904cca46aff4a923bc230d069230e15eb164af043f020dab33e5546f18560179
  unresolved_non_identifiable_risks: 39
  round4_review_hashes:
    real_platform_inventory_json: 5371f4c4c8dd8c7c292b6143243f1d9e5c68fdcbf70d2fa75274afe58885f9f4
    real_platform_field_status_json: a629c52497ca8eade0e197d6e8e398558f1c89ea13d85823d21a1b443f21a4a8
