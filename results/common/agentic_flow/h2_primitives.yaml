schema_version: 1
workflow:
  id: rvv-profile-workflow
  source_plan: docs/plan.md
  round: 0
manifest:
  capabilities:
    agent_tools: [codex]
    scripts:
      - check_env
      - run_killcheck
      - run_suite
      - analyze
      - search_model
      - check_calibration_gate
      - prepare_llvm_yushuxin_worktree
    artifact_schemas:
      - rvv.prompt.v1
      - rvv.toolCall.v1
      - rvv.workerContract.v1
      - rvv.workerOutput.v1
      - rvv.decision.v1
      - rvv.verification.v1
    human_input: true
    view: true
templates:
  - id: round-0-worker-split
    primitive: h2-template
    path: artifacts/prompts/round-0-worker-split.md
  - id: worker-f3-review-fix
    primitive: h2-template
    path: artifacts/prompts/worker-f3-review-fix.md
boards:
  - id: goal-tracker
    primitive: h2-board
    path: boards/goal_tracker.yaml
  - id: execution-state
    primitive: h2-board
    path: boards/execution_state.yaml
  - id: simulator-selection
    primitive: h2-board
    path: boards/simulator_selection.yaml
  - id: experiment-matrix
    primitive: h2-board
    path: boards/experiment_matrix.yaml
  - id: inference-state
    primitive: h2-board
    path: boards/inference_state.yaml
artifacts:
  - id: worker-a-contract
    primitive: h2-artifact
    schema: rvv.workerContract.v1
    path: artifacts/worker_contracts/worker-a.md
  - id: worker-a-output
    primitive: h2-artifact
    schema: rvv.workerOutput.v1
    path: artifacts/worker_outputs/worker-a.md
  - id: worker-a-verification
    primitive: h2-artifact
    schema: rvv.verification.v1
    path: artifacts/verification/worker-a-verification.md
  - id: worker-a-tool-call
    primitive: h2-artifact
    schema: rvv.toolCall.v1
    path: artifacts/tool_calls/worker-a-verification.json
  - id: worker-b-contract
    primitive: h2-artifact
    schema: rvv.workerContract.v1
    path: artifacts/worker_contracts/worker-b.md
  - id: worker-b-output
    primitive: h2-artifact
    schema: rvv.workerOutput.v1
    path: artifacts/worker_outputs/worker-b.md
  - id: worker-b-verification
    primitive: h2-artifact
    schema: rvv.verification.v1
    path: artifacts/verification/worker-b-verification.md
  - id: worker-b-tool-call
    primitive: h2-artifact
    schema: rvv.toolCall.v1
    path: artifacts/tool_calls/worker-b-verification.json
  - id: worker-c-contract
    primitive: h2-artifact
    schema: rvv.workerContract.v1
    path: artifacts/worker_contracts/worker-c.md
  - id: worker-c-output
    primitive: h2-artifact
    schema: rvv.workerOutput.v1
    path: artifacts/worker_outputs/worker-c.md
  - id: worker-c-verification
    primitive: h2-artifact
    schema: rvv.verification.v1
    path: artifacts/verification/worker-c-verification.md
  - id: worker-c-tool-call
    primitive: h2-artifact
    schema: rvv.toolCall.v1
    path: artifacts/tool_calls/worker-c-verification.json
  - id: worker-d-contract
    primitive: h2-artifact
    schema: rvv.workerContract.v1
    path: artifacts/worker_contracts/worker-d.md
  - id: worker-d-output
    primitive: h2-artifact
    schema: rvv.workerOutput.v1
    path: artifacts/worker_outputs/worker-d.md
  - id: worker-d-verification
